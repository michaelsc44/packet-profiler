name: CodeQL Analysis

on:
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        with:
          category: codeql-python
