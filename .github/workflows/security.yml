name: Security Scanning

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/supply-chain \
            --config p/owasp-top-ten \
            --config .semgrep.yml \
            --error \
            --sarif \
            --output semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  bandit:
    name: Bandit Security Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r src/profiler/ \
            -ll \
            -f json \
            -o bandit-report.json

      - name: Display Bandit report
        if: always()
        run: |
          python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          if results:
              print(f'Bandit found {len(results)} issue(s):')
              for r in results:
                  print(f\"  [{r['issue_severity']}] {r['issue_text']} in {r['filename']}:{r['line_number']}\")
              sys.exit(1)
          else:
              print('Bandit: no issues found')
          "

  pip-audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (libpcap)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install pip-audit and project
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e .

      - name: Run pip-audit
        run: pip-audit

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Trivy filesystem scan
        # Pinned to SHA for v0.35.0 — do NOT use @master or a version tag.
        # The trivy-action repo was subject to a supply-chain attack via mutable tags;
        # pinning to a commit SHA is the safe approach.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: false

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
